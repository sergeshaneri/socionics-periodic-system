<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0B0D" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#EDEAE0" media="(prefers-color-scheme: light)" />
    <title>Socionics Periodic System</title>
    <script>
      // Apply persisted theme before paint to prevent FOUC on mobile.
      (function () {
        try {
          var t = localStorage.getItem('socionics-theme');
          if (t === 'light') document.documentElement.classList.add('light');
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
